stages:
  data_ingestion:
    cmd: py -m src.data.data_ingestion
    deps:
      - src/data/data_ingestion.py
    params:
      - data_ingestion.test_size
    outs:
      - data/raw

  data_preprocessing:
    cmd: py -m src.data.data_preprocessing
    deps:
      - data/raw
      - src/data/data_preprocessing.py
    outs:
      - data/interim

  feature_engineering:
    cmd: py -m src.features.build_features
    deps:
      - data/interim
      - src/features/build_features.py
    params:
      - feature_engineering.max_features
    outs:
      - data/processed
      - models/vectorizer.pkl

  model_building:
    cmd: py -m src.models.model_building
    deps:
      - data/processed
      - src/models/model_building.py
    outs:
      - models/model.pkl

  model_evaluation:
    cmd: py -m src.models.model_evaluation
    deps:
      - models/model.pkl
      - src/models/model_evaluation.py
    metrics:
      - reports/metrics.json
    outs:
      - reports/experiment_info.json

  register_model:
    cmd: py -m src.models.register_model
    deps:
      - reports/experiment_info.json
      - src/models/register_model.py